@if (!hideNav()) {
  <nav class="navbar" [class.scrolled]="scrolled()">
    <div class="nav-inner">

      <a class="brand" routerLink="/" (click)="closeMenu()">
        <img src="assets/logo.icon.png" alt="Tech Academy" class="brand-logo" />
        <span class="brand-name">
          Tech <span class="brand-slash">/</span> Academy
        </span>
      </a>

      <ul class="nav-links">
        <li>
          <a routerLink="/"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }">
            Inicio
          </a>
        </li>
        <li>
          <a routerLink="/quienes-somos"
             routerLinkActive="active">
            Quiénes Somos
          </a>
        </li>
        <li>
          <a routerLink="/contactanos"
             routerLinkActive="active">
            Contáctanos
          </a>
        </li>
      </ul>

      <a routerLink="/login" class="btn-login">
        Iniciar Sesión
      </a>

      <button class="hamburger"
              [class.open]="menuOpen()"
              (click)="toggleMenu()"
              aria-label="Menú">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>

    @if (menuOpen()) {
      <div class="mobile-menu">
        <ul>
          <li>
            <a routerLink="/"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: true }"
               (click)="closeMenu()">
              Inicio
            </a>
          </li>
          <li>
            <a routerLink="/quienes-somos"
               routerLinkActive="active"
               (click)="closeMenu()">
              Quiénes Somos
            </a>
          </li>
          <li>
            <a routerLink="/contactanos"
               routerLinkActive="active"
               (click)="closeMenu()">
              Contáctanos
            </a>
          </li>
          <li>
            <a routerLink="/login"
               class="btn-login-mobile"
               (click)="closeMenu()">
              Iniciar Sesión
            </a>
          </li>
        </ul>
      </div>
    }

  </nav>
}
